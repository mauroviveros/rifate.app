version: 2

updates:
  - package-ecosystem: npm
    directory: /

    schedule:
      interval: weekly
      day: monday
      time: "09:00"

    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

    open-pull-requests-limit: 2

    rebase-strategy: disabled

    versioning-strategy: increase

    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

      major:
        update-types:
          - major
        patterns:
          - "*"

    labels:
      - dependencies

    commit-message:
      prefix: "chore(deps): ⬆️"
